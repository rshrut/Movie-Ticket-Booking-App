<div class="movie-card" [routerLink]="['/movies', movie.id]">
  <div class="poster-wrapper">
    <img [src]="movie.posterUrl" [alt]="movie.title" />
    <div class="rating-badge">★ {{ movie.rating }}</div>
  </div>
  <div class="movie-info">
    <h3>{{ movie.title }}</h3>
    <p class="genre">{{ movie.genre }}</p>
  </div>
</div>
