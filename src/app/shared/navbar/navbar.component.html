<div class="navbar">
  <div class="logo-container">
    <a [routerLink]="['/movies']" class="logo">🎬 Movie Booker</a>
  </div>

  <input #navToggle type="checkbox" id="nav-toggle" class="nav-toggle" />
  <label for="nav-toggle" class="nav-toggle-label">
    <span></span>
  </label>

  <div class="nav-links">
    <a [routerLink]="['/movies']" routerLinkActive="active" class="nav-item" (click)="navToggle.checked = false">
      Movies
    </a>
    @if (isLoggedIn) {
      <a
        [routerLink]="['/my-bookings']"
        routerLinkActive="active"
        class="nav-item"
        (click)="navToggle.checked = false"
      >
        My Bookings
      </a>
      <button (click)="logout()" class="auth-button logout-button" (click)="navToggle.checked = false">
        Logout
      </button>
    } @else {
      <a
        [routerLink]="['/auth/login']"
        routerLinkActive="active"
        class="auth-link nav-item"
      >
        Login
      </a>
      <a [routerLink]="['/auth/register']" class="auth-button register-button">
        Register
      </a>
    }
  </div>
</div>
