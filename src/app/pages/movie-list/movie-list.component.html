<div class="container">
  <div *ngIf="isLoading" class="loader-container">
    <div class="spinner"></div>
    <p>Fetching movies...</p>
    
    <div *ngIf="isTakingLong" class="cold-start-warning">
      <p>💡 <strong>Note:</strong> We're using a free cloud server. It takes about 60 seconds to "wake up" if it hasn't been used recently. Thanks for your patience!</p>
    </div>
  </div>

  <div *ngIf="error" class="alert alert-danger">
    {{ error }}
    <button (click)="loadMovies()" class="btn btn-sm btn-outline-danger ms-3">Retry</button>
  </div>

  <div *ngIf="!isLoading && !error" class="movie-grid">
    <app-movie-card 
      *ngFor="let movie of movies" 
      [movie]="movie">
    </app-movie-card>
  </div>
</div>
